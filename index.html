<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>

/* ════════════════════════════════════════════
   TOKENS & THEME
════════════════════════════════════════════ */
:root {
  --c0: #04040c;
  --c1: #0a0a1a;
  --c2: #0f0f24;
  --glass:    rgba(255,255,255,0.045);
  --glass2:   rgba(255,255,255,0.08);
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --purple:   #8b5cf6;
  --purple2:  #a78bfa;
  --blue:     #3b82f6;
  --cyan:     #06b6d4;
  --pink:     #ec4899;
  --text:     #e2e2f0;
  --text2:    #9090b0;
  --text3:    #4a4a6a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

/* ════════════════════════════════════════════
   RESET & ANIMATED BG
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--sans);
  color: var(--text);
  background: var(--c0);
}

.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 900px 700px at 20% -10%,  rgba(88,28,220,0.22)  0%, transparent 65%),
    radial-gradient(ellipse 700px 800px at 90%  110%, rgba(6,182,212,0.14)  0%, transparent 60%),
    radial-gradient(ellipse 600px 500px at 60%  50%,  rgba(236,72,153,0.07) 0%, transparent 55%),
    linear-gradient(160deg, #04040c 0%, #07071a 50%, #04040c 100%);
  animation: meshShift 20s ease-in-out infinite alternate;
}

@keyframes meshShift {
  0% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(15deg) brightness(1.05); }
  100% { filter: hue-rotate(-10deg) brightness(1); }
}

.orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat linear infinite; }
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.15), transparent 70%); top: -150px; left: -100px; animation-duration: 25s; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%); bottom: -100px; right: -80px; animation-duration: 30s; animation-direction: reverse; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(15px, 30px) scale(0.95); }
}

/* ════════════════════════════════════════════
   LAYOUT & SIDEBAR
════════════════════════════════════════════ */
.shell { position: relative; z-index: 1; display: grid; grid-template-columns: 256px 1fr; width: 100%; height: 100%; }

.sidebar { display: flex; flex-direction: column; background: var(--glass); backdrop-filter: blur(24px); border-right: 1px solid var(--border); overflow: hidden; position: relative; }
.sidebar::after { content: ''; position: absolute; right: 0; top: 0; width: 1px; height: 100%; background: linear-gradient(180deg, transparent, rgba(139,92,246,0.5), rgba(6,182,212,0.4), transparent); }

.logo-block { padding: 28px 22px 22px; border-bottom: 1px solid var(--border); }
.logo-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; padding: 3px 10px 3px 6px; margin-bottom: 10px; }
.logo-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; box-shadow: 0 0 8px #a78bfa; animation: blink 2.5s infinite; }
.logo-pill-text { font-size: 9px; font-weight: 600; letter-spacing: 2px; color: #a78bfa; }
.logo-name { font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #fff, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }

.sb-btns { display: flex; flex-direction: column; gap: 6px; padding: 14px; }
.btn-new { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(6,182,212,0.15)); border: 1px solid rgba(139,92,246,0.35); border-radius: 12px; color: #c4b5fd; font-weight: 600; cursor: pointer; transition: 0.25s; }
.btn-new:hover { border-color: rgba(139,92,246,0.6); box-shadow: 0 0 20px rgba(139,92,246,0.2); }

.conv-list { flex: 1; overflow-y: auto; padding: 8px; }
.conv-item { padding: 10px 12px; border-radius: 10px; font-size: 12px; color: var(--text2); cursor: pointer; transition: 0.18s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
.conv-item::before { content: '◦'; color: var(--text3); }
.conv-item:hover { background: var(--glass2); color: var(--text); transform: translateX(3px); }
.conv-item.active { background: rgba(139,92,246,0.12); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.25); }

/* ════════════════════════════════════════════
   MAIN & CHAT
════════════════════════════════════════════ */
.main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 36px; border-bottom: 1px solid var(--border); background: rgba(4,4,12,0.5); backdrop-filter: blur(20px); z-index: 10; }
.chat { flex: 1; overflow-y: auto; padding: 28px 52px 16px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }

/* ── WELCOME ── */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; animation: fadeUp 0.7s ease-out; }
.welcome-icon { width: 72px; height: 72px; border-radius: 22px; background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(6,182,212,0.2)); border: 1px solid rgba(139,92,246,0.3); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 22px; }
.welcome h2 { font-size: 26px; font-weight: 600; color: #fff; margin-bottom: 10px; }
.welcome p { font-size: 14px; color: var(--text2); margin-bottom: 28px; }

.welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; }
.chip { padding: 8px 16px; background: var(--glass); border: 1px solid var(--border2); border-radius: 100px; font-size: 12px; color: var(--text2); cursor: pointer; transition: 0.2s; font-weight: 500; }
.chip:hover { background: rgba(139,92,246,0.15); color: #c4b5fd; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(139,92,246,0.15); }

/* ── BUBBLES ── */
.msg-row { display: flex; width: 100%; gap: 12px; align-items: center; animation: fadeUp 0.35s ease-out; padding: 4px 0; }
.msg-row.user { flex-direction: row-reverse; justify-content: flex-start; }
.av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.msg-row.aria .av { background: linear-gradient(135deg, #6d28d9, #0891b2); color: #fff; box-shadow: 0 0 16px rgba(109,40,217,0.5); }
.msg-row.user .av { background: rgba(255,255,255,0.08); color: var(--text2); border: 1px solid var(--border2); }

.bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: 68%; }
.msg-row.user .bubble-wrap { align-items: flex-end; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; backdrop-filter: blur(10px); }
.msg-row.aria .bubble { background: var(--aria-bubble); border: 1px solid var(--border2); border-bottom-left-radius: 5px; color: var(--text); }
.msg-row.user .bubble { background: linear-gradient(135deg, rgba(109,40,217,0.3), rgba(59,130,246,0.2)); border: 1px solid rgba(139,92,246,0.3); border-bottom-right-radius: 5px; color: #ddd6fe; }

.tok { font-family: var(--mono); font-size: 12px; color: #a78bfa; background: rgba(139,92,246,0.15); padding: 1px 6px; border-radius: 5px; }

/* ── CONFIRMATION UI ── */
.confirm-row { display: flex; gap: 10px; margin-top: 12px; animation: fadeUp 0.3s ease-out; }
.confirm-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: all 0.2s; border: 1px solid transparent; color: #fff; }
.confirm-btn.yes { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); }
.confirm-btn.yes:hover { background: rgba(139,92,246,0.5); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,0.2); }
.confirm-btn.no { background: rgba(236,72,153,0.15); border-color: rgba(236,72,153,0.3); color: #fbcfe8; }
.confirm-btn.no:hover { background: rgba(236,72,153,0.3); transform: translateY(-1px); }

/* ── INPUT ── */
.input-area { padding: 16px 52px 22px; border-top: 1px solid var(--border); background: rgba(4,4,12,0.6); backdrop-filter: blur(24px); }
.input-shell { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border2); border-radius: 16px; padding: 6px 6px 6px 20px; transition: 0.3s; }
#cmdInput { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; padding: 10px 0; }
.send-btn { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #7c3aed, #2563eb); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.send-btn:hover { transform: scale(1.06); box-shadow: 0 0 30px rgba(124,58,237,0.55); }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.typing-bubble { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
.t-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple2); animation: tdot 1.4s infinite; }
@keyframes tdot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-8px); opacity: 1; } }

</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="shell">
  <aside class="sidebar">
    <div class="logo-block">
      <div class="logo-pill"><div class="logo-pill-dot"></div><span class="logo-pill-text">ONLINE</span></div>
      <div class="logo-name">ARIA</div>
    </div>
    <div class="sb-btns"><button class="btn-new" onclick="newChat()">+ New Chat</button></div>
    <div class="sb-section-label">Recent History</div>
    <div class="conv-list" id="convList"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-id">ARIA <span style="color:rgba(139,92,246,0.4)">/</span> SESSION</div>
      <div id="clock" style="font-family:var(--mono); font-size:11px; color:var(--text3);"></div>
    </div>

    <div class="chat" id="chat">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>How can I help you?</h2>
        <p>Open apps, check system stats, and more.</p>
        <div class="welcome-chips">
          <span class="chip" onclick="quickSend('open chrome')">🌐 Open Chrome</span>
          <span class="chip" onclick="quickSend('play lofi hip hop')">🎵 Play Lofi</span>
          <span class="chip" onclick="quickSend('system info')">💻 System Info</span>
          <span class="chip" onclick="quickSend('what time is it')">🕐 Time</span>
          <span class="chip" onclick="quickSend('search python')">🔍 Search</span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-shell">
        <input id="cmdInput" type="text" placeholder="Ask ARIA anything..." autocomplete="off"/>
        <button class="send-btn" onclick="sendCommand()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
/* ── state ── */
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('cmdInput');
const welcomeEl = document.getElementById('welcome');
let chats = [];
let currentChatId = null;
let pendingCommand = null;

/* ── helpers ── */
const wait = (ms) => new Promise(r => setTimeout(r, ms));
const getTime = () => new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
function fmt(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/([A-Z]:\\[\w\\]+)/g, '<span class="tok">$1</span>');
}

/* ── local storage & history ── */
function loadChats() {
  const stored = localStorage.getItem("aria_chats");
  chats = stored ? JSON.parse(stored) : [];
  if (chats.length === 0) createChat();
  else currentChatId = chats[0].id;
}

function saveChats() {
  if (chats.length > 10) chats = chats.slice(0, 10);
  localStorage.setItem("aria_chats", JSON.stringify(chats));
}

function createChat() {
  currentChatId = "chat_" + Date.now();
  chats.unshift({ id: currentChatId, title: "New Chat", messages: [] });
  saveChats();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('convList');
  list.innerHTML = '';
  chats.forEach(c => {
    const d = document.createElement('div');
    d.className = 'conv-item' + (c.id === currentChatId ? ' active' : '');
    d.textContent = c.title;
    d.onclick = () => switchChat(c.id);
    list.appendChild(d);
  });
}

function switchChat(id) {
  if (currentChatId === id) return;
  currentChatId = id;
  const chat = chats.find(c => c.id === id);
  clearChat();
  hideWelcome();
  if (chat && chat.messages.length > 0) {
    chat.messages.forEach(m => appendBubble(m.role, m.text));
  } else {
    chatEl.appendChild(welcomeEl);
    triggerWelcome();
  }
  renderSidebar();
}

function saveToHistory(role, text) {
  let chat = chats.find(c => c.id === currentChatId);
  if (!chat) { createChat(); chat = chats[0]; }
  if (chat.messages.length === 0 && role === 'user') {
    chat.title = text.length > 20 ? text.substring(0, 20) + '...' : text;
  }
  chat.messages.push({ role, text });
  saveChats();
  renderSidebar();
}

/* ── welcome experience ── */
async function triggerWelcome() {
  await wait(400);
  const typId = showTyping();
  await wait(900);
  removeTyping(typId);
  
  const hour = new Date().getHours();
  const greet = hour < 12 ? "morning" : hour < 18 ? "afternoon" : "evening";
  const welcomeText = `Good ${greet}. I'm ARIA. What would you like to do today?`;
  
  await typeBubble('aria', welcomeText);
}

async function typeBubble(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const id = 'txt_' + Date.now();
  row.innerHTML = `
    <div class="av">A</div>
    <div class="bubble-wrap">
      <div class="bubble-meta">ARIA · ${getTime()}</div>
      <div class="bubble" id="${id}" style="box-shadow: 0 0 20px rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4);"></div>
    </div>`;
  chatEl.appendChild(row);
  const el = document.getElementById(id);
  let cur = "";
  for(let i=0; i<text.length; i++){
    cur += text[i];
    el.innerHTML = fmt(cur) + '<span style="border-right:3px solid var(--purple2); animation:blink 0.8s infinite;"></span>';
    chatEl.scrollTop = chatEl.scrollHeight;
    await wait(30);
  }
  el.innerHTML = fmt(text);
}

/* ── messaging & confirmation ── */
async function sendCommand() {
  const cmd = inputEl.value.trim();
  if (!cmd) return;
  inputEl.value = '';
  hideWelcome();
  if (!currentChatId) createChat();

  appendBubble('user', cmd);
  saveToHistory('user', cmd);

  const sensitiveKeywords = ['open', 'find', 'system', 'play'];
  const isSensitive = sensitiveKeywords.some(k => cmd.toLowerCase().startsWith(k));

  if (isSensitive) {
    pendingCommand = cmd;
    showConfirmation(cmd);
    return; 
  }

  await executeCommand(cmd);
}

function showConfirmation(cmd) {
  const row = document.createElement('div');
  row.className = `msg-row aria`;
  row.innerHTML = `
    <div class="av">A</div>
    <div class="bubble-wrap">
      <div class="bubble-meta">ARIA · ${getTime()}</div>
      <div class="bubble" style="border-color: rgba(236,72,153,0.4);">
        This will execute: <strong>${fmt(cmd)}</strong> on your system. Continue?
        <div class="confirm-row">
          <button class="confirm-btn yes" onclick="handleConfirmation(true)">Yes, proceed</button>
          <button class="confirm-btn no" onclick="handleConfirmation(false)">Cancel</button>
        </div>
      </div>
    </div>`;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function handleConfirmation(isYes) {
  const cmd = pendingCommand;
  pendingCommand = null;

  const btnRows = document.querySelectorAll('.confirm-row');
  btnRows.forEach(row => row.remove());

  if (!isYes) {
    appendBubble('aria', 'Action cancelled.');
    saveToHistory('aria', 'Action cancelled.');
    return;
  }

  await executeCommand(cmd);
}

async function executeCommand(cmd) {
  const tid = showTyping();
  try {
    const res = await fetch('/command', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ command: cmd })
    });
    const data = await res.json();
    removeTyping(tid);
    appendBubble('aria', data.response);
    saveToHistory('aria', data.response);
  } catch {
    removeTyping(tid);
    appendBubble('aria', 'System error — check backend.');
  }
}

function appendBubble(role, text) {
  const isU = role === 'user';
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.innerHTML = `
    <div class="av">${isU ? 'Y' : 'A'}</div>
    <div class="bubble-wrap">
      <div class="bubble-meta">${isU ? 'You' : 'ARIA'} · ${getTime()}</div>
      <div class="bubble">${fmt(text)}</div>
    </div>`;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const id = 't_' + Date.now();
  const row = document.createElement('div');
  row.id = id; row.className = 'msg-row aria';
  row.innerHTML = `<div class="av">A</div><div class="bubble-wrap"><div class="bubble typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>`;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return id;
}

function removeTyping(id) { const e = document.getElementById(id); if(e) e.remove(); }
function clearChat() { chatEl.innerHTML = ''; }
function hideWelcome() { if(welcomeEl.parentNode === chatEl) chatEl.removeChild(welcomeEl); }
function quickSend(c) { inputEl.value = c; sendCommand(); }

function newChat() {
  createChat();
  clearChat();
  chatEl.appendChild(welcomeEl);
  triggerWelcome();
}

/* ── init ── */
inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') sendCommand(); });
loadChats();
renderSidebar();

const activeChat = chats.find(c => c.id === currentChatId);
if (activeChat && activeChat.messages.length === 0) {
  triggerWelcome();
} else {
  switchChat(currentChatId);
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);
</script>
</body>
</html>
