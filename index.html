<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA — Desktop Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0c0c0e;
    --surface:   #131316;
    --surface2:  #1c1c21;
    --border:    rgba(255,255,255,0.07);
    --accent:    #7c6aff;
    --accent2:   #a78bfa;
    --text:      #e8e8f0;
    --muted:     #555566;
    --user-bg:   #1e1b3a;
    --aria-bg:   #13131a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0 16px;
  }

  .logo {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent2);
  }

  .logo p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .new-chat {
    margin: 16px 12px;
    padding: 10px 14px;
    background: rgba(124,106,255,0.12);
    border: 1px solid rgba(124,106,255,0.25);
    border-radius: 10px;
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .new-chat:hover {
    background: rgba(124,106,255,0.22);
    border-color: rgba(124,106,255,0.45);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 12px 20px 6px;
  }

  .recent-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  .recent-list::-webkit-scrollbar { width: 3px; }
  .recent-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .recent-item {
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #888899;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recent-item:hover, .recent-item.active {
    background: rgba(124,106,255,0.10);
    color: var(--accent2);
  }

  .settings-btn {
    margin: 8px 12px 0;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .settings-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── CHAT ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .msg.aria .avatar {
    background: linear-gradient(135deg, #7c6aff, #a78bfa);
    color: #fff;
  }

  .msg.user .avatar {
    background: var(--surface2);
    color: var(--accent2);
    border: 1px solid rgba(124,106,255,0.3);
  }

  .bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: 70%; }

  .msg.user .bubble-wrap { align-items: flex-end; }

  .sender {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 0 4px;
  }

  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.5;
    margin-left: 6px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
  }

  .msg.aria .bubble {
    background: var(--aria-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,106,255,0.2);
    border-top-right-radius: 4px;
    color: #ccc6ff;
  }

  .code-inline {
    font-family: 'DM Mono', monospace;
    background: rgba(124,106,255,0.15);
    color: var(--accent2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  /* typing indicator */
  .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 2px;
    animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 40px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(124,106,255,0.4);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.08);
  }

  #cmdInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    caret-color: var(--accent2);
  }

  #cmdInput::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c6aff, #a78bfa);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <h1>ARIA</h1>
    <p>DESKTOP ASSISTANT</p>
  </div>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div class="section-label">RECENT</div>
  <div class="recent-list" id="recentList"></div>
  <button class="settings-btn">(⚙) Settings</button>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-row">
      <input id="cmdInput" type="text" placeholder="Type a command or speak..." autocomplete="off"/>
      <button class="send-btn" onclick="sendCommand()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="footer-note">ARIA executes real system tasks — double-check before confirming destructive actions</p>
  </div>
</main>

<script>
  const chatArea   = document.getElementById('chatArea');
  const input      = document.getElementById('cmdInput');
  const recentList = document.getElementById('recentList');

  let currentConvId = null; // assigned by backend on first message

  // ── Init ──
  appendMsg('aria', "Hey. I'm ARIA. Tell me what to do — open an app, manage your files, search the web, or run a system task.");
  loadSidebar();

  // ── Send on Enter ──
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendCommand(); });

  async function sendCommand() {
    const cmd = input.value.trim();
    if (!cmd) return;
    input.value = '';
    appendMsg('user', cmd);

    const typingId = appendTyping();
    try {
      const res  = await fetch('/command', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ command: cmd, conv_id: currentConvId })
      });
      const data = await res.json();
      currentConvId = data.conv_id;   // lock in the ID backend assigned
      removeTyping(typingId);
      appendMsg('aria', data.response);
      loadSidebar();                  // refresh sidebar after each message
    } catch (err) {
      removeTyping(typingId);
      appendMsg('aria', 'Connection error. Is the Flask server running?');
    }
  }

  // ── Sidebar ──
  async function loadSidebar() {
    const res   = await fetch('/get_conversations');
    const convs = await res.json();
    recentList.innerHTML = '';
    convs.reverse().forEach(c => {
      const div = document.createElement('div');
      div.className = 'recent-item' + (c.id === currentConvId ? ' active' : '');
      div.textContent = c.preview;
      div.onclick = () => loadConversation(c.id);
      recentList.appendChild(div);
    });
  }

  async function loadConversation(id) {
    currentConvId = id;
    const res  = await fetch('/get_conversation', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ id })
    });
    const msgs = await res.json();
    chatArea.innerHTML = '';
    msgs.forEach(m => appendMsg(m.role, m.text));
    loadSidebar(); // re-render to update active state
  }

  // ── New Chat ──
  function newChat() {
    currentConvId = null;
    chatArea.innerHTML = '';
    appendMsg('aria', "New session. What do you need?");
    input.focus();
    loadSidebar();
  }

  // ── Helpers ──
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMsg(role, text) {
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${isUser ? 'Y' : 'AR'}</div>
      <div class="bubble-wrap">
        <span class="sender">${isUser ? 'You' : 'ARIA'} <span class="timestamp">${getTime()}</span></span>
        <div class="bubble">${formatText(text)}</div>
      </div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendTyping() {
    const id = 'typing_' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg aria';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">AR</div>
      <div class="bubble-wrap">
        <span class="sender">ARIA · typing</span>
        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function formatText(text) {
    return text.replace(/([\/\\][\w\/\\.\-]+)/g, '<span class="code-inline">$1</span>');
  }
</script>
</body>
</html>
